name: CI Pipeline to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: pip install mlflow==2.19.0 tensorflow
        
      - name: Run MLProject
        run: |
          cd MLProject
          mlflow run . --env-manager=local
          
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and Push MLflow Docker Image
        run: |
          cd MLProject
          RUN_ID=$(ls -t mlruns/0 | head -n 1)
          echo "Building Docker Image for Run ID: $RUN_ID"
          
          mlflow models build-docker -m "runs:/$RUN_ID/model_pe_malware" -n ${{ secrets.DOCKER_USERNAME }}/pe-malware:latest
          
          docker push ${{ secrets.DOCKER_USERNAME }}/pe-malware:latest